name: gateway-ci

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12.3-slim
    defaults:
      run:
        working-directory: gateway
    env:
      DEBUG: 'false'
      GATEWAY_SECRET_KEY: gateway_secret
      AUTH_GRPC_HOST: auth
      AUTH_GRPC_PORT: 8001
      SOCIAL_GRPC_HOST: social
      SOCIAL_GRPC_PORT: 8002
      TRANSACTION_GRPC_HOST: transaction
      TRANSACTION_GRPC_PORT: 8003
      NOTIFICATION_GRPC_HOST: notification
      NOTIFICATION_GRPC_PORT: 8004
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pytest
          pip install -r requirements.txt
      - name: Security audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format=json > pip-audit.json || true
          python -c "import json,sys; data=json.load(open('pip-audit.json', encoding='utf-8')); issues=[(dep.get('name'), v.get('id'), str(v.get('severity') or v.get('cvss_severity') or '').lower()) for dep in data.get('dependencies', []) for v in dep.get('vulns', []) if str(v.get('severity') or v.get('cvss_severity') or '').lower() in {'high','critical'}]; print('High/Critical vulnerabilities found:', issues) if issues else print('No High/Critical vulnerabilities detected by severity metadata.'); sys.exit(0)"
      - name: Run tests (FastAPI + Pydantic consistency)
        run: pytest -q




