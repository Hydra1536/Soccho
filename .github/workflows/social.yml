name: social-ci

on:
  push:
    branches: [main]
    paths:
      - 'social/**'
      - '.github/workflows/social.yml'
  pull_request:
    paths:
      - 'social/**'
      - '.github/workflows/social.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    defaults:
      run:
        working-directory: social
    env:
      DEBUG: 'false'
      SOCIAL_SECRET_KEY: ci-social-secret
      DATABASE_URL: db-secret
      REDIS_CACHE_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pytest
          pip install -r requirements.txt
      - name: Security audit
        run: |
          pip-audit -r requirements.txt --format=json > pip-audit.json || true
          python - <<'PY'
import json, sys
with open('pip-audit.json', 'r', encoding='utf-8') as f:
    data = json.load(f)
issues = []
for dep in data.get('dependencies', []):
    for v in dep.get('vulns', []):
        sev = str(v.get('severity') or v.get('cvss_severity') or '').lower()
        if sev in {'high', 'critical'}:
            issues.append((dep.get('name'), v.get('id'), sev))
if issues:
    print('High/Critical vulnerabilities found:', issues)
    sys.exit(1)
print('No High/Critical vulnerabilities detected by severity metadata.')
PY
      - name: Django deploy checks
        run: python manage.py check --deploy
      - name: Run tests
        run: pytest -q
