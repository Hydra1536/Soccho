name: transaction-ci

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'transaction/**'
      - '.github/workflows/transaction.yml'
  pull_request:
    paths:
      - 'transaction/**'
      - '.github/workflows/transaction.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12.3-slim
    defaults:
      run:
        working-directory: transaction
    env:
      DEBUG: 'false'
      TRANSACTION_SECRET_KEY: transaction_secret
      DATABASE_URL: db_secret
      REDIS_CACHE_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pytest
          pip install -r requirements.txt
      - name: Security audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format=json > pip-audit.json || true
          python -c "import json,sys; data=json.load(open('pip-audit.json', encoding='utf-8')); issues=[(dep.get('name'), v.get('id'), str(v.get('severity') or v.get('cvss_severity') or '').lower()) for dep in data.get('dependencies', []) for v in dep.get('vulns', []) if str(v.get('severity') or v.get('cvss_severity') or '').lower() in {'high','critical'}]; print('High/Critical vulnerabilities found:', issues) if issues else print('No High/Critical vulnerabilities detected by severity metadata.'); sys.exit(0)"
      - name: Django deploy checks
        run: python manage.py check --deploy
      - name: Run tests
        run: pytest -q




